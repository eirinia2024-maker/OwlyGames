<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tic-Tac-Toe (CVC Words)</title>
  <style>
    :root { --gap: 12px; --cell: min(22vw, 140px); }
    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0; padding: 24px;
      display: grid; place-items: center;
      background: #f6f7fb;
      color: #111;
    }
    .wrap{
      width: min(520px, 92vw);
      background: #fff;
      border-radius: 18px;
      padding: 18px 18px 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    h1{ font-size: 18px; margin: 0 0 10px; }
    .sub{ font-size: 13px; margin: 0 0 14px; color: #555; line-height: 1.35; }
    .bar{
      display: flex; gap: 10px; align-items: center; justify-content: space-between;
      margin: 10px 0 14px;
      flex-wrap: wrap;
    }
    .status{
      font-weight: 600;
      padding: 8px 10px;
      background: #f0f2ff;
      border-radius: 12px;
      font-size: 14px;
    }
    .btns{ display: flex; gap: 10px; flex-wrap: wrap; }
    button{
      border: 0; cursor: pointer;
      padding: 10px 12px;
      border-radius: 12px;
      font-weight: 600;
      background: #111;
      color: #fff;
      transition: transform .05s ease, opacity .15s ease;
    }
    button:active{ transform: translateY(1px); }
    button.secondary{ background: #e9ecf7; color: #111; }
    button:disabled{ opacity: .55; cursor: not-allowed; }

    .grid{
      display: grid;
      grid-template-columns: repeat(3, var(--cell));
      gap: var(--gap);
      justify-content: center;
      user-select: none;
    }
    .cell{
      position: relative;
      width: var(--cell);
      height: var(--cell);
      border-radius: 18px;
      background: #fafbff;
      border: 2px solid #e6e8f5;
      display: grid;
      place-items: center;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      transition: transform .05s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .cell:hover{
      box-shadow: 0 8px 18px rgba(0,0,0,.06);
      border-color: #cfd6ff;
    }
    .word{
      font-size: clamp(18px, 3.8vw, 28px);
      font-weight: 800;
      letter-spacing: .5px;
      text-transform: lowercase;
    }
    .mark{
      position: absolute;
      top: 10px; right: 12px;
      font-size: 18px;
      font-weight: 900;
      width: 28px; height: 28px;
      border-radius: 10px;
      display: grid; place-items: center;
      background: #111;
      color: #fff;
      opacity: 0;
      transform: scale(.9);
      transition: opacity .12s ease, transform .12s ease;
    }
    .cell.claimed .mark{ opacity: 1; transform: scale(1); }
    .cell.claimed{ cursor: not-allowed; }
    .cell.win{
      border-color: #1b5cff;
      box-shadow: 0 0 0 4px rgba(27,92,255,.15);
      background: #f2f6ff;
    }
    .legend{
      margin-top: 12px;
      font-size: 12px;
      color: #666;
    }
    .legend code{ background:#f3f4f8; padding: 2px 6px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Крестики-нолики: CVC words</h1>
    <p class="sub">
      Правило можно сделать «учебным»: перед кликом игрок читает слово вслух.
      Клик — поставить <b>X</b>/<b>O</b> в клетку. Слова остаются видимыми.
    </p>

    <div class="bar">
      <div class="status" id="status">Ход: X</div>
      <div class="btns">
        <button class="secondary" id="newWordsBtn" title="Сменить слова в клетках">New words</button>
        <button id="restartBtn" title="Сбросить игру">Restart</button>
      </div>
    </div>

    <div class="grid" id="grid" aria-label="tic tac toe grid"></div>

    <div class="legend">
      Подсказка: CVC = <code>consonant-vowel-consonant</code> (например, <code>cat</code>, <code>pin</code>, <code>sun</code>).
    </div>
  </div>

  <script>
    // --- CVC word bank (можно расширять) ---
    const WORDS = [
      "cat","bat","rat","hat","map","tap","cap","nap","pan",
      "pin","bin","tin","fin","win","sit","fit","hit","lip","zip",
      "sun","run","fun","bun","cup","pup","mud","hug","bug","rug",
      "log","fog","dog","hog","fox","box","cot","pot","top","hop",
      "red","bed","pen","hen","jet","net","vet","web","leg","beg"
    ];

    const gridEl = document.getElementById("grid");
    const statusEl = document.getElementById("status");
    const restartBtn = document.getElementById("restartBtn");
    const newWordsBtn = document.getElementById("newWordsBtn");

    let board = Array(9).fill(null);   // 'X' | 'O' | null
    let wordsInCells = Array(9).fill("");
    let current = "X";
    let gameOver = false;

    const WIN_LINES = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    function pick9Words() {
      // случайные 9 разных слов (если в списке >= 9)
      const pool = [...WORDS];
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool.slice(0, 9);
    }

    function render() {
      gridEl.innerHTML = "";
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement("div");
        cell.className = "cell" + (board[i] ? " claimed" : "");
        cell.dataset.idx = i;

        const word = document.createElement("div");
        word.className = "word";
        word.textContent = wordsInCells[i];

        const mark = document.createElement("div");
        mark.className = "mark";
        mark.textContent = board[i] ? board[i] : "";

        cell.appendChild(word);
        cell.appendChild(mark);

        cell.addEventListener("click", () => onCellClick(i));
        gridEl.appendChild(cell);
      }
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function highlightWin(line) {
      const cells = gridEl.querySelectorAll(".cell");
      line.forEach(i => cells[i].classList.add("win"));
    }

    function checkWinner() {
      for (const line of WIN_LINES) {
        const [a,b,c] = line;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line };
        }
      }
      if (board.every(Boolean)) return { winner: null, line: null }; // ничья
      return null;
    }

    function onCellClick(i) {
      if (gameOver) return;
      if (board[i]) return;

      board[i] = current;
      render();

      const res = checkWinner();
      if (res) {
        gameOver = true;
        if (res.winner) {
          setStatus(`Победа: ${res.winner}!`);
          highlightWin(res.line);
        } else {
          setStatus("Ничья!");
        }
        return;
      }

      current = current === "X" ? "O" : "X";
      setStatus(`Ход: ${current}`);
    }

    function restart(keepWords = true) {
      board = Array(9).fill(null);
      current = "X";
      gameOver = false;
      if (!keepWords) wordsInCells = pick9Words();
      setStatus("Ход: X");
      render();
    }

    restartBtn.addEventListener("click", () => restart(true));
    newWordsBtn.addEventListener("click", () => restart(false));

    // init
    wordsInCells = pick9Words();
    render();
  </script>
</body>
</html>
